# Host nginx config for join.cur8.fun
# Placed at: /etc/nginx/sites-available/join.cur8.fun
# (Certbot will add SSL blocks automatically after: certbot --nginx -d join.cur8.fun)

server {
    listen 80;
    listen [::]:80;
    server_name join.cur8.fun;

    # Let certbot handle this block — it will redirect HTTP → HTTPS
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
