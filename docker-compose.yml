version: '3.9'

services:
  join-cur8-backend:
    build: ./backend
    container_name: join-cur8-backend
    restart: unless-stopped
    ports:
      - "8002:8002"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data
      - ./frontend:/frontend
    networks:
      - cur8-network

  join-cur8-frontend:
    build: ./frontend
    container_name: join-cur8-frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - join-cur8-backend
    networks:
      - cur8-network

networks:
  cur8-network:
    driver: bridge
