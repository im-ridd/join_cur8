server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Pass real IP and protocol to backend
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

    # Proxy API calls to backend
    location /api/ {
        proxy_pass http://join-cur8-backend:8002;
        proxy_read_timeout 60s;
    }

    location /auth/ {
        proxy_pass http://join-cur8-backend:8002;
    }

    # Admin panel: fully served by the backend (HTML + static JS + API)
    location /admin-ui/ {
        proxy_pass http://join-cur8-backend:8002;
    }

    location /admin {
        proxy_pass http://join-cur8-backend:8002;
    }

    # Referral: /anyname → index.html (JS reads the path)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Named pages
    location = /success.html { try_files $uri /success.html; }
}

