server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to backend
    location /api/ {
        proxy_pass http://join-cur8-backend:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    location /auth/ {
        proxy_pass http://join-cur8-backend:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /admin/login {
        proxy_pass http://join-cur8-backend:8002;
        proxy_set_header Host $host;
    }

    location /admin/logout {
        proxy_pass http://join-cur8-backend:8002;
        proxy_set_header Host $host;
    }

    location /admin/dashboard {
        proxy_pass http://join-cur8-backend:8002;
        proxy_set_header Host $host;
    }

    location /admin/referrals {
        proxy_pass http://join-cur8-backend:8002;
        proxy_set_header Host $host;
    }

    location /admin/rewards {
        proxy_pass http://join-cur8-backend:8002;
        proxy_set_header Host $host;
    }

    location /admin/settings {
        proxy_pass http://join-cur8-backend:8002;
        proxy_set_header Host $host;
    }

    # Admin frontend (static)
    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    # Referral: /anyname → index.html (JS reads the path)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Named pages
    location = /success.html { try_files $uri /success.html; }
}
